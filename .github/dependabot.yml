version: 2
updates:
  # npm dependencies — weekly check, grouped to avoid PR spam
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      # Bundle minor + patch updates together — fewer PRs to review.
      # Major updates still come as individual PRs (breaking changes deserve attention).
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions versions — keep CI runners on patched releases
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
