name: Deploy to Oracle Cloud

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

env:
  NODE_VERSION: "20"

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Package release
        run: |
          tar --exclude='node_modules' --exclude='.git' --exclude='.next/cache' \
            -czf release.tar.gz \
            .next public package.json package-lock.json next.config.ts \
            ecosystem.config.js src

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.ORACLE_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.ORACLE_SSH_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy to Oracle Cloud
        env:
          SSH_USER: ${{ secrets.ORACLE_SSH_USER }}
          SSH_HOST: ${{ secrets.ORACLE_SSH_HOST }}
          APP_DIR: /var/www/portfolio
          PM2_NAME: siddhartha-portfolio
        run: |
          TIMESTAMP=$(date -u +%Y%m%d_%H%M%S)
          RELEASE_PATH="$APP_DIR/releases/$TIMESTAMP"

          ssh "$SSH_USER@$SSH_HOST" "mkdir -p $RELEASE_PATH"
          scp release.tar.gz "$SSH_USER@$SSH_HOST:$RELEASE_PATH/"

          ssh "$SSH_USER@$SSH_HOST" bash -se <<EOF
          set -euo pipefail
          cd "$RELEASE_PATH"
          tar -xzf release.tar.gz
          rm release.tar.gz
          npm ci --omit=dev --no-audit --no-fund

          ln -sfn "$RELEASE_PATH" "$APP_DIR/current"

          if pm2 describe "$PM2_NAME" >/dev/null 2>&1; then
            pm2 reload "$PM2_NAME" --update-env
          else
            pm2 start "$APP_DIR/current/ecosystem.config.js" --env production
            pm2 save
          fi

          cd "$APP_DIR/releases"
          ls -1t | tail -n +4 | xargs -r rm -rf
          EOF

      - name: Health check
        env:
          DOMAIN: ${{ secrets.SITE_DOMAIN }}
        run: |
          sleep 6
          for i in 1 2 3; do
            if curl -fsS -o /dev/null "https://$DOMAIN"; then
              echo "✓ Site healthy"
              exit 0
            fi
            sleep 4
          done
          echo "✗ Health check failed"; exit 1
