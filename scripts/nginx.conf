# ────────────────────────────────────────────────────────────────────
# Nginx reverse proxy for Next.js portfolio.
# Place at: /etc/nginx/sites-available/portfolio
# Symlink:  /etc/nginx/sites-enabled/portfolio
#
# After Certbot runs: --nginx -d siddharthakumar.dev -d www.siddharthakumar.dev
# It will inject SSL config automatically and update server_name.
# ────────────────────────────────────────────────────────────────────

# ── Rate limit zone ────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=portfolio_rate:10m rate=30r/s;

# ── HTTP → HTTPS redirect (Certbot auto-configures this after SSL) ──
server {
    listen 80;
    listen [::]:80;
    server_name siddharthakumar.dev www.siddharthakumar.dev;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Pre-SSL: serve directly. Post-Certbot: this becomes 301 to HTTPS.
    location / {
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/proxy_params;
    }
}

